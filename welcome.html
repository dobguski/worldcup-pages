<script>
// ── Counter engine v2 (global counter.json + localStorage dedup, cumulative only) ──
(function(){
  // Local per-browser tracking (UV + PV only, always cumulative)
  function localStats() {
    try { const r = localStorage.getItem('wc_site_stats'); return r ? JSON.parse(r) : {uv:0,pv:0}; }
    catch(e) { return {uv:0,pv:0}; }
  }
  function saveLocal(s) { localStorage.setItem('wc_site_stats', JSON.stringify(s)); }

  let local = localStats();
  const hasVisited = localStorage.getItem('wc_uv_flag');
  const isNewUV = !hasVisited;
  if (isNewUV) {
    local.uv += 1;
    localStorage.setItem('wc_uv_flag', '1');
  }
  local.pv += 1;
  saveLocal(local);

  // Fetch global counter.json (with cache-bust for freshness)
  fetch('counter.json?v=' + Date.now())
    .then(r => r.json())
    .then(global => {
      document.getElementById('visitCount').textContent = global.uv;
      document.getElementById('totalViews').textContent = global.pv + local.pv - 1;
    })
    .catch(() => {
      document.getElementById('visitCount').textContent = local.uv;
      document.getElementById('totalViews').textContent = local.pv;
    });

  // Sync: notify local server to increment global counter (best-effort)
  if (isNewUV) {
    fetch('http://localhost:8888/counter/uv', { mode: 'no-cors' }).catch(() => {});
  }
  fetch('http://localhost:8888/counter/pv', { mode: 'no-cors' }).catch(() => {});

  // Visitor location ping (timezone + language only, no IP/personal data)
  try {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const lang = navigator.language || 'unknown';
    document.getElementById('visitorTZ').textContent = '📍 ' + tz.replace('_',' ') + ' · ' + lang;
    fetch('http://localhost:8888/visitor?tz=' + encodeURIComponent(tz) + '&lang=' + encodeURIComponent(lang), { mode: 'no-cors' }).catch(() => {});
  } catch(e) {}
})();

const pageUrl = 'https://datamenu.xyz/';

// ── Share buttons ──
const shareText = encodeURIComponent('🏆 Dob Guski 的世界杯小站 | 2026 FIFA World Cup Live — 实时比分·球员档案·Polymarket预测');
const shareUrl = encodeURIComponent(pageUrl);
document.getElementById('shareX').href = 'https://twitter.com/intent/tweet?text=' + shareText + '&url=' + shareUrl;

function shareWechat() {
  navigator.clipboard.writeText(pageUrl).then(() => {
    const t = document.getElementById('copiedToast');
    t.textContent = '✅ 链接已复制！打开微信粘贴发送给朋友';
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; t.textContent = '✅ 链接已复制！'; }, 3000);
  });
}

function shareXHS() {
  navigator.clipboard.writeText(pageUrl + '\n\n' + decodeURIComponent(shareText)).then(() => {
    const t = document.getElementById('copiedToast');
    t.textContent = '✅ 链接+文案已复制！打开小红书粘贴发布';
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; t.textContent = '✅ 链接已复制！'; }, 3000);
  });
}

// ── Stars ──
const starsEl = document.getElementById('stars');
for (let i=0;i<50;i++) {
  const s = document.createElement('div'); s.className='star';
  const sz = Math.random()*2.2+1;
  s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;animation-delay:'+Math.random()*3+'s;animation-duration:'+(Math.random()*2+1.5)+'s';
  starsEl.appendChild(s);
}
</script>
