name: 数据更新
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 刷新数据并构建
        run: python build_static.py
      - name: 提交更新
        run: |
          git config user.name "dobguski-bot"
          git config user.email "dobguski@gmail.com"
          git add dashboard.html
          if git diff --cached --quiet; then
            echo "数据无变化"
          else
            git commit -m "data: 自动更新 $(date +%Y-%m-%d)"
            git push
          fi
