// User's local timezone (detected from browser)
const userTZ = (() => {
  try { return Intl.DateTimeFormat().resolvedOptions().timeZone; }
  catch(e) { return 'Asia/Shanghai'; }
})();
const isBJT = userTZ === 'Asia/Shanghai' || userTZ === 'Asia/Urumqi' || userTZ === 'Asia/Taipei' || userTZ === 'Asia/Hong_Kong' || userTZ === 'Asia/Macau' || userTZ === 'Asia/Singapore' || userTZ === 'Asia/Kuala_Lumpur';

// Format match time from UTC timestamp to user's local timezone
function formatMatchTime(m) {
  if (!m.utc_ts) {
    // Fallback: use stored BJT time
    return { date: m.date, time: m.time + ' BJT', label: m.time_label || '' };
  }
  const dt = new Date(m.utc_ts);
  const localDate = dt.toLocaleDateString('sv-SE', { timeZone: userTZ }); // ISO yyyy-mm-dd
  const localTime = dt.toLocaleTimeString('zh-CN', { timeZone: userTZ, hour: '2-digit', minute: '2-digit', hour12: false });
  // Compute if date differs from venue date
  let label = '';
  if (localDate !== m.date) {
    label = localDate > m.date ? '次日' : '前日';
  }
  // Beijing reference (always shown as small hint)
  const bjRef = m.time + ' BJT' + (m.time_label ? ' (' + m.time_label + ')' : '');
  return { date: localDate, time: localTime, label: label, bjRef: bjRef };
}
let pmData = {};
let userVotes = {};

function loadVotes() {
  try { userVotes = JSON.parse(localStorage.getItem('wc_votes') || '{}'); } catch(e) { userVotes = {}; }
}
function saveVotes() {
  localStorage.setItem('wc_votes', JSON.stringify(userVotes));

function teamName(en) {
  const cn = teamNamesCN[en] || '';
  if (currentLang === 'cn') return cn || en;
  if (currentLang === 'dual') return cn ? cn + ' ' + en : en;
  return en; // 'en'
}

async function loadData() {
  try {
    const cb = '?v=' + Date.now();
    const fetchOpts = { cache: 'no-store' };  // Force bypass browser cache
    const [mRes, sRes, tRes, tmRes, pmRes, goalsRes, bracketRes] = await Promise.all([
      fetch('match_data.json' + cb, fetchOpts),
      fetch('standings.json' + cb, fetchOpts),
      fetch('team_names.json' + cb, fetchOpts),
      fetch('teams.json' + cb, fetchOpts).catch(() => null),
      fetch('polymarket.json' + cb, fetchOpts).catch(() => null),
      fetch('goalscorers.json' + cb, fetchOpts).catch(() => null),
      fetch('bracket_data.json' + cb, fetchOpts).catch(() => null)
    ]);
    matchData = await mRes.json();
    standings = await sRes.json();
    teamNamesCN = await tRes.json();
    if (tmRes) teamsData = await tmRes.json();
    else teamsData = {};
    if (pmRes) pmData = await pmRes.json();
    else pmData = {};
    if (goalsRes) goalsData = await goalsRes.json();
    else goalsData = {};
    if (bracketRes) bracketData = await bracketRes.json();
    else bracketData = {};
    loadVotes();
    loadPlayerDetails();
    // Load data quality report
    try {
      const vRes = await fetch('verify_report.json' + cb);
      const verify = await vRes.json();
      const badge = document.getElementById('qualityBadge');
      const status = verify.summary.status;
      const score = verify.quality_score || 100;
      badge.textContent = `📊 ${score}分`;
      badge.className = `quality-badge ${status}`;
      badge.title = verify.summary.verdict || '';
    } catch(e) {
      document.getElementById('qualityBadge').textContent = '--';
    }
    // Apply live scores from local server (real-time, bypasses git push delay)
    await applyLiveScores();
    renderAll();
    scrollToRelevantMatch();
    scheduleNextRefresh();
    let updateText;
    if (currentLang === 'cn') updateText = t('lastUpdate') + ': ' + new Date().toLocaleString('zh-CN');
    else if (currentLang === 'en') updateText = t('lastUpdate') + ': ' + new Date().toLocaleString('en-US');
    else updateText = t('lastUpdate') + ': ' + new Date().toLocaleString('zh-CN') + ' / ' + new Date().toLocaleString('en-US');
    document.getElementById('lastUpdate').textContent = updateText;
  } catch(e) {
    document.getElementById('lastUpdate').textContent = t('retrying');
  }
}

function renderAll() {
  renderStandings();
  renderMatches();
  renderLive();
  renderTeams();
  renderBracket();
  renderPM();
  renderGoals();
}

// Live scores cache — survives loadData() wipes of matchData
let _liveScoresCache = [];

async function _fetchLiveScores() {
  try {
    const resp = await fetch('http://localhost:8888/live-scores', { signal: AbortSignal.timeout(5000) });
    const data = await resp.json();
    _liveScoresCache = data.live || [];
  } catch(e) {}
}

function _applyLiveScoresToMatchData() {
  _liveScoresCache.forEach(s => {
    matchData.forEach(m => {
      if (m.is_result) return;
      if (m.home_team === s.home_team && m.away_team === s.away_team) {
        if (s.home_score != null) m.home_score = s.home_score;
        if (s.away_score != null) m.away_score = s.away_score;
        if (s.is_result) m.is_result = true;
      }
    });
  });
}

// Poll every 10s — keep cache fresh, re-render on change
let _livePoller = null;
function startLiveScorePolling() {
  if (_livePoller) return;
  _livePoller = setInterval(async () => {
    const prevScores = JSON.stringify(_liveScoresCache);
    await _fetchLiveScores();
    _applyLiveScoresToMatchData();
    if (JSON.stringify(_liveScoresCache) !== prevScores) {
      renderMatches();
      renderLive();
    }
  }, 10000);
}
startLiveScorePolling();

// Called after each loadData() cycle: re-apply cached live scores (loadData wipes matchData)
async function applyLiveScores() {
  await _fetchLiveScores();
  _applyLiveScoresToMatchData();
}

// Auto-scroll to most relevant match on every load
function scrollToRelevantMatch() {
  // 1) Live matches — scroll to first live card (stay on 最新战报)
  const liveCards = document.querySelectorAll('.match-card.live');
  if (liveCards.length > 0) {
    liveCards[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  // 2) Most recently finished match (highest date that's past)
  const finishedCards = document.querySelectorAll('.match-card.finished[data-date]');
  if (finishedCards.length > 0) {
    finishedCards[finishedCards.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  // 3) First upcoming match
  const today = new Date().toISOString().slice(0,10);
  const allCards = document.querySelectorAll('.match-card[data-date]');
  for (const card of allCards) {
    if ((card.getAttribute('data-date') || '') >= today) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
  }

  // 4) Fallback: last card
  if (allCards.length > 0) {
    allCards[allCards.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function renderStandings() {
  // Mark 8 best third-place teams (only after 2+ matchdays per group)
  const allThirds = [];
  let minGP = 99;
  const order = 'ABCDEFGHIJKL'.split('');
  for (const g of order) {
    const table = standings[g] || [];
    if (table.length >= 3) {
      const third = table[2];
      third._group = g;
      allThirds.push(third);
      if (third.gp < minGP) minGP = third.gp;
    }
  }
  const showBestThird = minGP >= 2;  // Only after 2 matches per team
  if (showBestThird) {
    allThirds.sort((a, b) => b.pts - a.pts || (b.gd||0) - (a.gd||0) || (b.gf||0) - (a.gf||0));
    allThirds.forEach((t, i) => { if (i < 8) t._bestThird = true; });
  }

  const grid = document.getElementById('groupsGrid');
  let html = '';
  for (const g of order) {
    const table = standings[g] || [];
    if (!table.length) continue;
    html += '<div class="group-card">';
    html += `<div class="group-header">🏆 ${g}${t('group')}</div>`;
    html += '<table class="group-table"><thead><tr>';
    html += '<th class="team-col">' + t('table.team') + '</th>';
    html += '<th style="width:20px">' + t('table.gp') + '</th><th style="width:20px">' + t('table.w') + '</th>';
    html += '<th style="width:20px">' + t('table.d') + '</th><th style="width:20px">' + t('table.l') + '</th>';
    html += '<th style="width:40px">+/-</th><th class="pts-col" style="width:28px">' + t('table.pts') + '</th>';
    html += '</tr></thead><tbody>';
    table.forEach((team, i) => {
      const rowClass = i < 2 ? ' top' + (i+1) : (i === 2 && team._bestThird ? ' top3' : '');
      const gdStr = (team.gd > 0 ? '+' : '') + team.gd;
      const gfga = team.gf + ':' + team.ga;
      const cn = teamNamesCN[team.team] || '';
      const en = team.team || '';
      const thirdBadge = (i === 2 && team._bestThird) ? ' <span style="font-size:.55em;background:#22c55e;color:#fff;padding:1px 3px;border-radius:3px;vertical-align:middle" title="' + (currentLang==='cn'?'最佳小组第三晋级':'Best 3rd advances') + '">✓</span>' : '';
      const nameHtml = cn ? `<span style="font-size:.82em">${cn}${thirdBadge}</span><br><span style="font-size:.62em;color:#64748b">${en}</span>` : `<span style="font-size:.82em">${en}${thirdBadge}</span>`;
      html += `<tr class="${rowClass}">
        <td class="team-col" title="${cn} ${en}">${nameHtml}</td>
        <td>${team.gp}</td><td>${team.w}</td><td>${team.d}</td><td>${team.l}</td>
        <td><span class="gd-col">${gdStr}</span><br><span style="font-size:.65em;color:#475569">${gfga}</span></td>
        <td class="pts-col">${team.pts}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  }
  grid.innerHTML = html;
}

function renderMatches() {
  const container = document.getElementById('matchesByDate');
  const byDate = {};
  matchData.forEach(m => {
    const t = formatMatchTime(m);
    const d = t.date || m.date || '?';
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push({ match: m, fmt: t });
  });

  const sortedDates = Object.keys(byDate).sort();
  const monthNamesCN = ['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const monthNamesEN = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let html = '';
  for (const date of sortedDates) {
    const items = byDate[date];
    const parts = date.split('-');
    const mo = parseInt(parts[1]), day = parseInt(parts[2]);
    let dateLabel;
    if (currentLang === 'cn') dateLabel = `📅 ${monthNamesCN[mo]}${day}日 (${items.length}${t('matches')})`;
    else if (currentLang === 'en') dateLabel = `📅 ${monthNamesEN[mo]} ${day} (${items.length} ${t('matches')})`;
    else dateLabel = `📅 ${monthNamesEN[mo]} ${day} · ${monthNamesCN[mo]}${day}日 (${items.length} ${t('matches')})`;

    html += `<div class="section-title">${dateLabel}</div>`;
    html += '<div class="matches-grid">';
    items.forEach(({match, fmt}) => {
      // Smart live detection: time window + score state
      const nowTs = Date.now();
      const ko = match.utc_ts ? new Date(match.utc_ts).getTime() : 0;
      const inWindow = !match.is_result && ko > 0 && nowTs >= ko && nowTs <= ko + 2.2 * 3600000;
      const hasScore = match.home_score != null && match.away_score != null;
      // Match is 'live' only if in window AND not yet finished
      // Once past window OR has is_result, it's finished
      const isLive = inWindow && !match.is_result;
      const isDone = match.is_result || (hasScore && nowTs > ko + 2.2 * 3600000);
      const cardClass = isLive ? 'live' : (isDone ? 'finished' : '');
      const statusLabel = isLive ? t('status.live') : (isDone ? t('status.ft') : t('status.scheduled'));
      const statusCls = isLive ? 'status-live' : (isDone ? 'status-ft' : 'status-scheduled');
      // Local time display + BJT reference for non-BJT users
      let timeDisplay = `<span style="font-weight:600">${fmt.time}</span>`;
      if (fmt.label) timeDisplay += ` <span style="font-size:.75em;color:#e2b04a">${fmt.label}</span>`;
      if (!isBJT) timeDisplay += ` <span style="font-size:.65em;color:#475569;margin-left:3px">(${fmt.bjRef})</span>`;
      const isKO = !match.group || match.group === 'KO' || !'ABCDEFGHIJKL'.includes(match.group||'');
      const groupLabel = isKO ? '🏆 淘汰赛' : ((match.group||'') + t('group'));
      const hasPlaceholder = (match.home_team||'').includes('Winner') || (match.away_team||'').includes('Winner') ||
                             (match.home_team||'').includes('Loser') || (match.away_team||'').includes('Loser');
      if (hasPlaceholder && !isDone) return;  // Skip placeholder future matches
      let venueTime = '';
      if (match.venue_tz) {
        const off = parseInt((match.venue_tz||'UTC+0').replace('UTC',''));
        const utcMs = new Date(match.utc_ts).getTime();
        const venueMs = utcMs + off * 3600000;
        const vd = new Date(venueMs);
        const vt = vd.getUTCHours().toString().padStart(2,'0') + ':' + vd.getUTCMinutes().toString().padStart(2,'0');
        venueTime = ` <span style=\"font-size:.6em;color:#475569\">场地${vt}</span>`;
      }
      let infoLine = `${fmt.date} ${timeDisplay}${venueTime} · ${groupLabel} · ${match.venue||''}`;

      html += `<div class="match-card ${cardClass}" data-date="${fmt.date}" data-key="${match.home_team}-${match.away_team}">
        <div class="match-date">${infoLine}</div>
        <div class="match-teams">
          <div class="team"><div class="team-name">${teamName(match.home_team)}</div></div>
          <div class="score ${!isDone&&!isLive?'pending':''}">${isDone||isLive ? (match.home_score!=null?match.home_score:0)+'-'+(match.away_score!=null?match.away_score:0)+(match.penalty_home!=null?' <span style=\"font-size:.6em;color:#e2b04a\">('+match.penalty_home+'-'+match.penalty_away+' PK)</span>':'') : 'vs'}</div>
          <div class="team"><div class="team-name">${teamName(match.away_team)}</div></div>
        </div>
        <div class="match-info"><span class="match-status ${statusCls}">${statusLabel}</span></div>
        ${buildPollRow(match)}
        ${buildPMRow(match)}
      </div>`;
    });
    html += '</div>';
  }
  container.innerHTML = html;
}

function renderLive() {
  const container = document.getElementById('liveMatches');
  // Time-window based: match is "live" if now is between kickoff and kickoff+2.5h
  const now = new Date();
  const liveMatches = matchData.filter(m => {
    if (m.is_result || !m.utc_ts) return false;
    const ko = new Date(m.utc_ts);
    return now >= ko && now <= new Date(ko.getTime() + 2.2 * 3600000);
  });
  const banner = document.getElementById('liveBanner');
  if (liveMatches.length > 0) {
    banner.classList.add('active');
    let html = '';
    liveMatches.forEach(m => {
      const fmt = formatMatchTime(m);
      const hasScore = m.home_score != null && m.away_score != null;
      let liveTimeDisplay = `<span style="font-weight:600">${fmt.time}</span>`;
      if (fmt.label) liveTimeDisplay += ` <span style="font-size:.75em;color:#e2b04a">${fmt.label}</span>`;
      if (!isBJT) liveTimeDisplay += ` <span style="font-size:.65em;color:#475569;margin-left:3px">(${fmt.bjRef})</span>`;
      html += `<div class="match-card live" data-date="${fmt.date}" data-key="${m.home_team}-${m.away_team}">
        <div class="match-date">${fmt.date} ${liveTimeDisplay} · ${m.group}${t('group')} · ${m.venue}</div>
        <div class="match-teams">
          <div class="team"><div class="team-name">${teamName(m.home_team)}</div></div>
          <div class="score live-pulse">${hasScore ? (m.home_score!=null?m.home_score:0)+'-'+(m.away_score!=null?m.away_score:0)+(m.penalty_home!=null?' ('+m.penalty_home+'-'+m.penalty_away+' PK)':'') : '0-0'}</div>
          <div class="team"><div class="team-name">${teamName(m.away_team)}</div></div>
        </div>
        <div class="match-info"><span class="match-status status-live">🔴 ${t('status.live')}</span></div>
        ${buildPollRow(m)}
        ${buildPMRow(m)}
      </div>`;
    });
    container.innerHTML = html;
  } else {
    // Fallback: show today's upcoming matches
    banner.classList.remove('active');
    const todayLocal = now.toISOString().slice(0,10);
    const todayUpcoming = matchData.filter(m => !m.is_result && formatMatchTime(m).date === todayLocal);
    if (todayUpcoming.length > 0) {
      let html = '<div style="text-align:center;color:#94a3b8;padding:8px;font-size:.78em">📅 ' + (currentLang==='cn'?'今日比赛':'Today') + ' (' + todayUpcoming.length + ')</div>';
      html += '<div class="matches-grid">';
      todayUpcoming.forEach(m => {
        const fmt = formatMatchTime(m);
        html += `<div class="match-card scheduled" data-date="${fmt.date}" data-key="${m.home_team}-${m.away_team}">
          <div class="match-date">${fmt.date} <span style="font-weight:600">${fmt.time}</span> · ${m.group}${t('group')} · ${m.venue}</div>
          <div class="match-teams">
            <div class="team"><div class="team-name">${teamName(m.home_team)}</div></div>
            <div class="score pending">vs</div>
            <div class="team"><div class="team-name">${teamName(m.away_team)}</div></div>
          </div>
          <div class="match-info"><span class="match-status status-scheduled">⏳ ${t('status.scheduled')}</span></div>
        </div>`;
      });
      html += '</div>';
      container.innerHTML = html;
    } else {
      container.innerHTML = `<div style="text-align:center;color:#64748b;padding:40px;">
        <p style="font-size:1em;">📅 ${currentLang==='cn'?'今日暂无比赛':'No matches today'}</p>
      <p style="margin-top:8px;">${t('noLiveSub')}</p>
    </div>`;
    }
  }
}

function renderTeams() {
  const container = document.getElementById('teamsContainer');
  if (!teamsData || Object.keys(teamsData).length === 0) {
    container.innerHTML = `<div style="text-align:center;color:#64748b;padding:40px;">

      <p style="margin-top:8px;">Team data is being collected from TheSportsDB API...</p>
    </div>`;

  }

  // Build filter bar + waterfall
  const groups = 'ABCDEFGHIJKL'.split('');
  let html = '<div class="filter-bar">';
  html += `<span class="filter-chip active" onclick="filterTeams('all')" id="chip-all">🌍 ${t('tab.teams')}</span>`;
  for (const g of groups) {
    const groupTeams = Object.values(teamsData).filter(t => t.group === g);

      html += `<span class="filter-chip" onclick="filterTeams('${g}')" id="chip-${g}">${g}${t('group')}</span>`;

function buildTeamCard(team) {
  const cnName = team.name_cn || team.name_en;
  const displayName = currentLang === 'cn' ? cnName :
                     currentLang === 'dual' ? `${cnName} ${team.name_en}` :
                     team.name_en;
  const history = team.history || {};
  const historyCn = team.history_cn || {};
  let bestText;
  if (currentLang === 'cn') bestText = historyCn.best || history.best || '';
  else if (currentLang === 'dual' && historyCn.best && historyCn.best !== history.best) bestText = `${historyCn.best} ${history.best}`;
  else bestText = history.best || '';

  let card = `<div class="team-card" data-group="${team.group}">
    <div class="team-card-header">
      ${team.badge ? `<img src="${team.badge}" class="team-card-badge" onerror="this.style.display='none'" alt="">` : ''}
      <div>
        <div class="team-card-name">${displayName}</div>
        <div class="team-card-history">${t('team.apps')}: ${history.apps || '?'} · ${t('team.best')}: ${bestText || '?'}</div>
      </div>
    </div>`;

  if (team.coach || team.stadium) {
    card += `<div class="team-card-meta">`;
    if (team.coach) card += `🧑‍🏫 ${t('team.coach')}: ${team.coach}`;
    if (team.coach && team.stadium) card += ` · `;
    if (team.stadium) card += `🏟 ${team.stadium}`;
    card += `</div>`;
  }

  const players = team.players || [];
  if (players.length > 0) {
    card += `<div style="font-size:.68em;color:#e2b04a;margin:6px 0 2px;font-weight:bold;">${t('team.players')} (${players.length})</div>`;
    card += `<table class="player-table">
      <tr><th>${t('team.number')}</th><th>${t('table.team')}</th><th>A</th><th>${t('team.position')}</th><th>${t('team.club')}</th></tr>`;
    for (const p of players) {
      let playerDisplay = p.name;
      if (currentLang === 'cn' && p.name_cn) playerDisplay = p.name_cn;
      else if (currentLang === 'dual' && p.name_cn && p.name_cn !== p.name) playerDisplay = `${p.name_cn} ${p.name}`;

      let posText = p.position || '';
      if (currentLang === 'cn' && p.position_cn) posText = p.position_cn;
      else if (currentLang === 'dual' && p.position_cn && p.position_cn !== p.position) posText = `${p.position_cn} ${p.position}`;

      let clubText = p.club || '';
      if (currentLang === 'cn' && p.club_cn) clubText = p.club_cn;
      else if (currentLang === 'dual' && p.club_cn && p.club_cn !== p.club) clubText = `${p.club_cn} ${p.club}`;

      card += `<tr>
        <td class="player-num">${p.number||'-'}</td>
        <td class="player-detail-trigger" onclick="openPlayerModal('${p.name.replace(/'/g,"\\'")}')">${playerDisplay}</td>
        <td style="text-align:center;font-size:.75em;color:#64748b;width:22px">${p.age||''}</td>
        <td class="player-pos">${posText}</td>
        <td class="player-club">${clubText}</td>
      </tr>`;
    }
    card += '</table>';
  }

  // Helper: format bilingual text (CN\n\nEN) into two paragraphs with divider
  function fmtBilingual(text, maxLen) {
    const parts = text.split('\n\n');
    const cn = parts[0] || '';
    const en = parts.slice(1).join('\n\n') || '';
    let out = '<span style="color:#cbd5e1">' + cn.substring(0, maxLen) + '</span>';
    if (en) {
      out += '<span style="display:block;margin:4px 0;border-top:1px solid #1e293b"></span>';
      out += '<span style="color:#64748b;font-style:italic">' + en.substring(0, maxLen) + '</span>';
    }
    return out;
  }

  // Dual Nationals
  if (team.dual_nationals) {
    card += `<div style="margin-top:6px;padding:6px 8px;background:#111827;border-radius:6px;font-size:.65em;line-height:1.4;border-left:2px solid #3b82f6">
      <span style="color:#60a5fa;font-weight:bold">🌍 ${currentLang==='cn'?'双重国籍':'Dual Nationals'}:</span> ${fmtBilingual(team.dual_nationals, 400)}</div>`;
  }
  // Key Stats
  if (team.key_stats) {
    const statsText = team.key_stats.replace(/\n/g, '<br>').substring(0, 700);
    card += `<div style="margin-top:4px;padding:5px 8px;background:#111827;border-radius:6px;font-size:.63em;color:#94a3b8;line-height:1.5">
      <span style="color:#e2b04a;font-weight:bold">📊 ${currentLang==='cn'?'关键数据':'Key Stats'}:</span><br>${statsText}</div>`;
  }
  // Historical Note
  if (team.historical_note) {
    card += `<div style="margin-top:4px;padding:5px 8px;background:#111827;border-radius:6px;font-size:.63em;line-height:1.4;border-left:2px solid #78716c">
      <span style="color:#a8a29e;font-weight:bold">📖 ${currentLang==='cn'?'历史看点':'History'}:</span> ${fmtBilingual(team.historical_note, 500)}</div>`;
  }

  card += '</div>';
  return card;
}

function filterTeams(group) {
  // Update chips
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  const chipId = group === 'all' ? 'chip-all' : `chip-${group}`;
  document.getElementById(chipId).classList.add('active');
  // Show/hide cards
  document.querySelectorAll('.team-card').forEach(card => {
    card.style.display = (group === 'all' || card.dataset.group === group) ? '' : 'none';
  });
}

function renderBracket() {
  const container = document.getElementById('bracketView');
  if (!standings || Object.keys(standings).length === 0) {
    container.innerHTML = '<div style=\"text-align:center;color:#64748b;padding:30px\">对阵数据加载中...</div>';
    return;
  }

  // Get qualified teams from standings
  const order = 'ABCDEFGHIJKL'.split('');
  const qualified = [];  // [{team, group, pos}]
  const thirds = [];
  order.forEach(g => {
    const table = standings[g] || [];
    if (table.length < 3) return;
    qualified.push({team: table[0].team, group: g, pos: 1, pts: table[0].pts});
    qualified.push({team: table[1].team, group: g, pos: 2, pts: table[1].pts});
    thirds.push({...table[2], group: g});
  });
  // 8 best thirds
  thirds.sort((a,b) => b.pts - a.pts || (b.gd||0) - (a.gd||0) || (b.gf||0) - (a.gf||0));
  thirds.slice(0, 8).forEach(t => qualified.push({team: t.team, group: t.group, pos: 3, pts: t.pts}));

  let html = '';

  // ── Group qualifying table ──
  html += '<div style=\"font-size:.9em;color:#e2b04a;margin-bottom:8px;font-weight:bold\">📊 小组出线球队 (' + qualified.length + ' teams)</div>';
  html += '<div style=\"background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px;margin-bottom:16px;overflow-x:auto\">';
  html += '<table style=\"width:100%;border-collapse:collapse;font-size:.72em\">';
  html += '<tr style=\"background:#0f1724;color:#94a3b8\"><th>组</th><th>🥇第1</th><th>🥈第2</th><th>第3</th></tr>';
  order.forEach(g => {
    const t = standings[g] || [];
    if (t.length < 3) return;
    const t3 = t[2].team;
    const isBest3 = thirds.slice(0,8).some(x => x.team === t3);
    html += `<tr style=\"border-bottom:1px solid #1e293b\">
      <td style=\"padding:4px;text-align:center;color:#e2b04a;font-weight:bold\">${g}</td>
      <td style=\"padding:4px;color:#94a3b8\">${teamName(t[0].team)}</td>
      <td style=\"padding:4px;color:#94a3b8\">${teamName(t[1].team)}</td>
      <td style=\"padding:4px;color:#64748b\">${teamName(t3)}${isBest3?' <span style=\"color:#22c55e;font-size:.8em\">✓</span>':''}</td>
    </tr>`;
  });
  html += '</table></div>';

  // ── R32 Knockout Results ──
  const koMatches = matchData.filter(m => {
    if (m.group && m.group === 'KO') {
      const hasPlaceholder = (m.home_team||'').includes('Winner') || (m.away_team||'').includes('Winner') ||
                             (m.home_team||'').includes('Loser') || (m.away_team||'').includes('Loser');
      return !hasPlaceholder;
    }
    return false;
  });

  // Deduplicate by (date, home, away)
  const seen = new Set();
  const koUnique = [];
  koMatches.forEach(m => {
    const key = m.date + '|' + m.home_team + '|' + m.away_team;
    if (!seen.has(key)) { seen.add(key); koUnique.push(m); }
  });

  // Split: finished (has scores) vs upcoming (no scores)
  const koDone = koUnique.filter(m => m.home_score != null).sort((a,b) => {
    // newest first (descending date)
    if (a.date !== b.date) return b.date.localeCompare(a.date);
    return (b.time||'').localeCompare(a.time||'');
  });
  const koUpcoming = koUnique.filter(m => m.home_score == null);

  // Helper: clean team name (remove "   2-3 pen." suffix)
  function cleanTeam(name) {
    return (name||'').replace(/\s{2,}[\d-]+\s*pen\.?/i, '').trim();
  }

  // Helper: determine winner
  function getWinner(m) {
    const hs = m.home_score, aws = m.away_score;
    if (hs == null || aws == null) return null;
    if (hs > aws) return 'home';
    if (aws > hs) return 'away';
    const ph = m.penalty_home, pa = m.penalty_away;
    if (ph != null && pa != null) return ph > pa ? 'home' : 'away';
    return null;
  }

  html += '<div style=\"font-size:.9em;color:#e2b04a;margin-bottom:8px;font-weight:bold\">🏆 淘汰赛 · Knockout (' + koDone.length + '场完赛)</div>';

  // ── Upcoming KO matches (if any) at top ──
  if (koUpcoming.length > 0) {
    html += '<div style=\"font-size:.8em;color:#fbbf24;margin-bottom:4px\">⏳ 即将进行</div>';
    html += '<div style=\"background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px;margin-bottom:12px\">';
    koUpcoming.forEach(m => {
      html += `<div style=\"display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #1e293b;font-size:.72em\">
        <span style=\"color:#64748b;min-width:65px\">${m.date}</span>
        <span style=\"flex:1;text-align:right;color:#94a3b8\">${teamName(cleanTeam(m.home_team))}</span>
        <span style=\"color:#475569;font-size:.85em\">vs</span>
        <span style=\"flex:1;color:#94a3b8\">${teamName(cleanTeam(m.away_team))}</span>
        <span style=\"color:#64748b;font-size:.65em;min-width:80px;text-align:right\">${m.venue||''}</span>
      </div>`;
    });
    html += '</div>';
  }

  // ── Finished KO matches — sorted newest→oldest at bottom ──
  if (koDone.length > 0) {
    html += '<div style=\"background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px;margin-bottom:16px\">';
    koDone.forEach((m, i) => {
      const cn1 = teamName(cleanTeam(m.home_team));
      const cn2 = teamName(cleanTeam(m.away_team));
      const winner = getWinner(m);
      const homeBold = winner === 'home';
      const awayBold = winner === 'away';
      // Penalty shootout badge
      let pkBadge = '';
      if (m.penalty_home != null && m.penalty_away != null) {
        pkBadge = ` <span style=\"font-size:.65em;color:#e2b04a\">(${m.penalty_home}-${m.penalty_away} PK)</span>`;
      }
      // Winner arrow
      const homeArrow = homeBold ? ' ▶' : '';
      const awayArrow = awayBold ? '◀ ' : '';
      html += `<div style=\"display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #1e293b;font-size:.73em\">
        <span style=\"color:#64748b;min-width:70px;font-size:.85em\">${m.date}</span>
        <span style=\"flex:1;text-align:right;color:${homeBold?'#f8fafc':'#94a3b8'};font-weight:${homeBold?'bold':'normal'}\">${homeArrow}${cn1}</span>
        <span style=\"font-weight:bold;color:#e2b04a;font-size:1.05em;min-width:40px;text-align:center\">${m.home_score}-${m.away_score}${pkBadge}</span>
        <span style=\"flex:1;color:${awayBold?'#f8fafc':'#94a3b8'};font-weight:${awayBold?'bold':'normal'}\">${cn2}${awayArrow}</span>
        <span style=\"color:#475569;font-size:.6em;min-width:70px;text-align:right\">${m.venue||''}</span>
      </div>`;
    });
    html += '</div>';
  }

  // ── R16 Bracket (from bracket_data.json) ──
  const r16Done = [], r16Upcoming = [];

  if (typeof bracketData !== 'undefined' && bracketData && bracketData.r16) {
    bracketData.r16.forEach(m => {
      const entry = {
        home: m.home, away: m.away,
        label: m.label || '', date: m.date || '', venue: m.venue || '',
        score: m.score || null, winner: m.winner || null
      };
      if (entry.score) r16Done.push(entry); else r16Upcoming.push(entry);
    });
  }

  if (r16Done.length + r16Upcoming.length > 0) {
    html += '<div style=\"font-size:.9em;color:#e2b04a;margin-bottom:8px;font-weight:bold\">🔮 1/8决赛 · Round of 16</div>';
    html += '<div style=\"background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px;margin-bottom:16px\">';

    // Completed R16 matches first
    if (r16Done.length > 0) {
      html += '<div style=\"font-size:.75em;color:#4ade80;margin-bottom:6px\">✅ 已完赛</div>';
      r16Done.forEach(m => {
        const hBold = m.winner === m.home;
        const aBold = m.winner === m.away;
        html += `<div style=\"display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #1e293b;font-size:.76em\">

          <span style=\"font-weight:bold;color:#e2b04a;min-width:36px;text-align:center\">${m.score}</span>
          <span style=\"flex:1;color:${aBold?'#f8fafc':'#94a3b8'};font-weight:${aBold?'bold':'normal'}\">${teamName(cleanTeam(m.away))}${aBold?' ◀':''}</span>
          <span style=\"color:#475569;font-size:.6em;min-width:80px;text-align:right\">${m.venue}</span>
        </div>`;
        if (m.winner) {
          html += `<div style=\"text-align:center;font-size:.65em;color:#4ade80;padding:2px 0\">⬆ ${teamName(cleanTeam(m.winner))} 晋级 1/4决赛</div>`;
        }
      });
    }

    // Upcoming R16 matches
    if (r16Upcoming.length > 0) {
      html += '<div style=\"font-size:.75em;color:#fbbf24;margin:8px 0 4px\">⏳ 即将进行</div>';
      html += '<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px\">';
      r16Upcoming.forEach(m => {
        html += `<div style=\"background:#0a0f1a;border:1px solid #334155;border-radius:8px;padding:8px;text-align:center\">

        html += '<div style=\"font-size:.75em;color:#4ade80;margin-bottom:4px\">✅ 已完赛</div>';
        qfDone.forEach(m => {
          const hBold = m.winner === m.home, aBold = m.winner === m.away;
          html += `<div style=\"display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #1e293b;font-size:.76em\">
            <span style=\"color:#64748b;min-width:55px\">${m.date}</span>

            <span style=\"font-weight:bold;color:#e2b04a;min-width:36px;text-align:center\">${m.score}</span>
            <span style=\"flex:1;color:${aBold?'#f8fafc':'#94a3b8'};font-weight:${aBold?'bold':'normal'}\">${teamName(cleanTeam(m.away))}${aBold?' ◀':''}</span>
            <span style=\"color:#475569;font-size:.6em;min-width:80px;text-align:right\">${m.venue}</span>

          if (m.winner) html += `<div style=\"text-align:center;font-size:.65em;color:#4ade80;padding:2px 0\">⬆ ${teamName(cleanTeam(m.winner))} 晋级半决赛</div>`;

      if (qfUpcoming.length > 0) {
        if (qfDone.length > 0) html += '<div style=\"font-size:.75em;color:#fbbf24;margin:8px 0 4px\">⏳ 即将进行</div>';
        qfUpcoming.forEach(m => {
          html += `<div style=\"display:flex;align-items:center;justify-content:center;gap:8px;font-size:.82em;padding:5px 0;border-bottom:1px solid #1e293b\">

      html += '</div>';

      // ── Semi-finals ──
      if (bracketData.sf && bracketData.sf.length > 0) {
        const sfDone = bracketData.sf.filter(m => m.score);
        const sfUpcoming = bracketData.sf.filter(m => !m.score);
        html += '<div style=\"font-size:.9em;color:#e2b04a;margin-bottom:8px;font-weight:bold\">🥈 半决赛 · Semi-finals</div>';
        html += '<div style=\"background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px;margin-bottom:16px\">';

        if (sfDone.length > 0) {
          sfDone.forEach(m => {
            const hBold = m.winner === m.home, aBold = m.winner === m.away;
            html += `<div style=\"display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #1e293b;font-size:.8em\">
              <span style=\"color:#64748b;min-width:55px\">${m.date}</span>
              <span style=\"flex:1;text-align:right;color:${hBold?'#f8fafc':'#94a3b8'};font-weight:${hBold?'bold':'normal'}\">${hBold?'▶ ':''}${teamName(cleanTeam(m.home))}</span>
              <span style=\"font-weight:bold;color:#e2b04a;min-width:36px;text-align:center\">${m.score}</span>
              <span style=\"flex:1;color:${aBold?'#f8fafc':'#94a3b8'};font-weight:${aBold?'bold':'normal'}\">${teamName(cleanTeam(m.away))}${aBold?' ◀':''}</span>
              <span style=\"color:#475569;font-size:.6em;min-width:80px;text-align:right\">${m.venue}</span>
            </div>`;
            if (m.winner) html += `<div style=\"text-align:center;font-size:.65em;color:#4ade80;padding:2px 0\">⬆ ${teamName(cleanTeam(m.winner))} 晋级决赛!</div>`;
          });
        }

        if (sfUpcoming.length > 0) {
          if (sfDone.length > 0) html += '<div style=\"font-size:.75em;color:#fbbf24;margin:8px 0 4px\">⏳ 即将进行</div>';
          sfUpcoming.forEach(m => {
            html += `<div style=\"display:flex;align-items:center;justify-content:center;gap:8px;font-size:.82em;padding:5px 0\">
              <span style=\"color:#94a3b8\">${teamName(cleanTeam(m.home))}</span>
              <span style=\"color:#64748b\">vs</span>
              <span style=\"color:#94a3b8\">${teamName(cleanTeam(m.away))}</span>
              <span style=\"color:#475569;font-size:.7em\">| ${m.date} · ${m.venue}</span>
            </div>`;
          });
        }
        html += '</div>';

        // ── Third Place ──
        if (bracketData.third && bracketData.third.length > 0) {
          html += '<div style=\"font-size:.85em;color:#94a3b8;margin-bottom:6px;font-weight:bold\">🥉 三四名决赛 · Third Place</div>';
          html += '<div style=\"background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px;margin-bottom:14px\">';
          bracketData.third.forEach(m => {
            if (m.score) {
              const hBold = m.winner === m.home, aBold = m.winner === m.away;
              html += `<div style=\"display:flex;align-items:center;gap:6px;padding:4px 0;font-size:.78em\">
                <span style=\"color:#64748b;min-width:55px\">${m.date}</span>
                <span style=\"flex:1;text-align:right;color:${hBold?'#f8fafc':'#94a3b8'};font-weight:${hBold?'bold':'normal'}\">${hBold?'▶ ':''}${teamName(cleanTeam(m.home))}</span>
                <span style=\"font-weight:bold;color:#e2b04a;min-width:36px;text-align:center\">${m.score}</span>
                <span style=\"flex:1;color:${aBold?'#f8fafc':'#94a3b8'};font-weight:${aBold?'bold':'normal'}\">${teamName(cleanTeam(m.away))}${aBold?' ◀':''}</span>
              </div>`;
              if (m.winner) html += `<div style=\"text-align:center;font-size:.6em;color:#cd7f32;padding:1px 0\">🥉 ${teamName(cleanTeam(m.winner))} 获得季军</div>`;
            } else {
              html += `<div style=\"display:flex;align-items:center;justify-content:center;gap:8px;font-size:.78em\">
                <span style=\"color:#94a3b8\">${teamName(cleanTeam(m.home))}</span><span style=\"color:#64748b\">vs</span>
                <span style=\"color:#94a3b8\">${teamName(cleanTeam(m.away))}</span>
                <span style=\"color:#475569;font-size:.7em\">| ${m.date}</span>
              </div>`;
            }
          });
          html += '</div>';
        }

        // ── Final ──
        if (bracketData.final && bracketData.final.length > 0) {
          html += '<div style=\"font-size:.9em;color:#e2b04a;margin-bottom:6px;font-weight:bold\">🏆 决赛 · Final</div>';
          html += '<div style=\"background:#1e293b;border:2px solid #e2b04a;border-radius:10px;padding:12px;margin-bottom:16px\">';
          bracketData.final.forEach(m => {
            if (m.score) {
              const hBold = m.winner === m.home, aBold = m.winner === m.away;
              html += `<div style=\"display:flex;align-items:center;gap:6px;padding:6px 0;font-size:.88em\">
                <span style=\"color:#64748b;min-width:55px\">${m.date}</span>
                <span style=\"flex:1;text-align:right;color:${hBold?'#f8fafc':'#94a3b8'};font-weight:${hBold?'bold':'normal'}\">${hBold?'👑 ':''}${teamName(cleanTeam(m.home))}</span>
                <span style=\"font-weight:bold;color:#e2b04a;font-size:1.2em;min-width:40px;text-align:center\">${m.score}</span>
                <span style=\"flex:1;color:${aBold?'#f8fafc':'#94a3b8'};font-weight:${aBold?'bold':'normal'}\">${teamName(cleanTeam(m.away))}${aBold?' 👑':''}</span>
              </div>`;
              if (m.winner) html += `<div style=\"text-align:center;font-size:.75em;color:#e2b04a;padding:4px 0\">🏆 ${teamName(cleanTeam(m.winner))} 世界冠军！</div>`;
            } else {
              html += `<div style=\"display:flex;align-items:center;justify-content:center;gap:10px;font-size:.9em;padding:6px 0\">
                <span style=\"color:#f8fafc;font-weight:bold\">${teamName(cleanTeam(m.home))}</span>
                <span style=\"color:#64748b\">vs</span>
                <span style=\"color:#f8fafc;font-weight:bold\">${teamName(cleanTeam(m.away))}</span>
              </div>`;
            }
            html += `<div style=\"text-align:center;font-size:.65em;color:#64748b\">${m.date} · ${m.venue}</div>`;
          });
          html += '</div>';
        }

        // ── Champion ──
        if (bracketData.champion && bracketData.champion.team) {
          html += '<div style=\"text-align:center;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);border:2px solid #e2b04a;border-radius:12px;padding:20px;margin-bottom:16px\">';
          html += '<div style=\"font-size:.7em;color:#94a3b8;margin-bottom:4px\">🏆 2026 FIFA WORLD CUP CHAMPION</div>';
          html += `<div style=\"font-size:1.6em;font-weight:bold;color:#e2b04a\">${teamName(cleanTeam(bracketData.champion.team))} ${bracketData.champion.flag||''}</div>`;
          html += `<div style=\"font-size:.75em;color:#94a3b8;margin-top:4px\">亚军: ${teamName(cleanTeam(bracketData.champion.runners_up||''))}</div>`;
          html += '</div>';
        }
      }
    }
  }

  container.innerHTML = html;
}

// ==================== PREDICTION POLL (REDESIGNED) ====================
function voteMatch(matchKey, choice) {
  // matchKey format: "home_team_vs_away_team"
  if (userVotes['_voted_' + matchKey]) return; // Already voted
  const current = userVotes[matchKey] || {home:0,draw:0,away:0};
  current[choice] = (current[choice] || 0) + 1;
  userVotes[matchKey] = current;
  userVotes['_voted_' + matchKey] = choice;
  saveVotes();
  // Re-render only the matches section (poll stats update in-place)
  renderMatches();
}

function buildPollRow(match) {
  const key = match.home_team + '_vs_' + match.away_team;
  const votes = userVotes[key] || {home:0,draw:0,away:0};
  const total = (votes.home||0) + (votes.draw||0) + (votes.away||0);
  const myVote = userVotes['_voted_' + key];
  const isLive = !match.is_result && match.home_score !== null && match.home_score !== undefined;
  const isDone = match.is_result;
  const isLocked = isLive || isDone; // Lock when match starts

  const homePct = total > 0 ? Math.round((votes.home||0)/total*100) : 0;
  const drawPct = total > 0 ? Math.round((votes.draw||0)/total*100) : 0;
  const awayPct = total > 0 ? Math.round((votes.away||0)/total*100) : 0;

  let html = '<div class="poll-section">';

  // Header
  html += '<div class="poll-header">';
  if (!isLocked) {
    html += `<span class="poll-title"><span class="icon">🎯</span> ${t('poll.predict')}</span>`;
    html += '<span class="poll-badge open">' + t('poll.open') + '</span>';
  } else if (isLive) {
    html += `<span class="poll-title"><span class="icon">🔒</span> ${t('poll.liveLocked')}</span>`;
    html += '<span class="poll-badge locked">' + t('poll.live') + '</span>';
  } else {
    html += `<span class="poll-title"><span class="icon">📊</span> ${t('poll.results')}</span>`;
    html += '<span class="poll-badge closed">' + t('poll.closed') + '</span>';
  }
  html += '</div>';

  if (!isLocked) {
    // === PRE-MATCH: Active voting ===
    html += '<div class="poll-options">';
    html += `<div class="poll-opt home ${myVote==='home'?'selected':''}" onclick="voteMatch('${key}','home')">`;
    html += `<div class="poll-opt-label home">${t('poll.home')}</div>`;
    html += `<div class="poll-opt-count">${votes.home||0} ${t('poll.votes')}</div>`;
    if (total > 0) html += `<div class="poll-opt-bar home" style="width:${homePct}%"></div>`;
    html += '</div>';

    html += `<div class="poll-opt draw ${myVote==='draw'?'selected':''}" onclick="voteMatch('${key}','draw')">`;
    html += `<div class="poll-opt-label draw">${t('poll.draw')}</div>`;
    html += `<div class="poll-opt-count">${votes.draw||0} ${t('poll.votes')}</div>`;
    if (total > 0) html += `<div class="poll-opt-bar draw" style="width:${drawPct}%"></div>`;
    html += '</div>';

    html += `<div class="poll-opt away ${myVote==='away'?'selected':''}" onclick="voteMatch('${key}','away')">`;
    html += `<div class="poll-opt-label away">${t('poll.away')}</div>`;
    html += `<div class="poll-opt-count">${votes.away||0} ${t('poll.votes')}</div>`;
    if (total > 0) html += `<div class="poll-opt-bar away" style="width:${awayPct}%"></div>`;
    html += '</div>';
    html += '</div>';

    if (total > 0) {
      html += `<div class="poll-total">${total} ${t('poll.totalVotes')}</div>`;
    } else {
      html += `<div class="poll-total">${t('poll.noVotes')}</div>`;
    }
  } else {
    // === MATCH STARTED: Locked results display ===
    html += '<div class="poll-results">';
    ['home','draw','away'].forEach(choice => {
      const pct = choice === 'home' ? homePct : (choice === 'draw' ? drawPct : awayPct);
      const count = choice === 'home' ? (votes.home||0) : (choice === 'draw' ? (votes.draw||0) : (votes.away||0));
      html += '<div class="poll-result">';
      html += `<div class="poll-result-bar ${choice}" style="height:${Math.max(pct*0.3,2)}px"></div>`;
      html += `<div class="poll-result-pct ${choice}">${pct}%</div>`;
      html += `<div class="poll-result-label">${count} ${t('poll.votes')}</div>`;
      html += '</div>';
    });
    html += '</div>';
    html += `<div class="poll-total">${total} ${t('poll.totalVotes')}${myVote ? ' · ' + t('poll.youVoted') + ': ' + t('poll.' + myVote) : ''}</div>`;
  }

  html += '</div>';
  return html;
}

// ==================== POLYMARKET PREDICTION (REDESIGNED) ====================
function findPMMatch(match) {
  if (!pmData || !pmData.matches) return null;
  const key1 = match.home_team + ' vs ' + match.away_team;
  const key2 = match.away_team + ' vs ' + match.home_team;
  return pmData.matches[key1] || pmData.matches[key2] || null;
}

function buildPMRow(match) {
  const pm = findPMMatch(match);
  if (!pm) return '';

  const isDone = match.is_result;
  const hp = Math.round(pm.home_prob * 100);
  const dp = Math.round(pm.draw_prob * 100);
  const ap = Math.round(pm.away_prob * 100);
  const isReal = !pm.source || pm.source !== 'estimated_from_team_strength';

  // Determine which outcome is favored
  let fav = 'home'; let favPct = hp;
  if (dp > favPct) { fav = 'draw'; favPct = dp; }
  if (ap > favPct) { fav = 'away'; favPct = ap; }

  let html = '<div class="pm-card">';

  // Header
  html += '<div class="pm-card-header">';
  html += `<span class="pm-card-title">📊 Polymarket ${isReal ? '盘口' : '推算'}</span>`;
  html += `<span class="pm-card-source ${isReal?'real':''}">${isReal ? '真实盘口' : '冠军赔率推算'}</span>`;
  html += '</div>';

  // Probability bar: Home
  html += '<div class="pm-bar-row">';
  html += `<span class="pm-bar-label ${fav==='home'?'fav':''}">${t('poll.home')}</span>`;
  html += `<div class="pm-bar-track"><div class="pm-bar-fill ${fav==='home'?'fav':(hp>dp&&hp>ap?'mid':'dog')}" style="width:${Math.max(hp,2)}%"></div></div>`;
  html += `<span class="pm-bar-pct">${hp}%</span>`;
  html += '</div>';

  // Probability bar: Draw
  html += '<div class="pm-bar-row">';
  html += `<span class="pm-bar-label ${fav==='draw'?'fav':''}">${t('poll.draw')}</span>`;
  html += `<div class="pm-bar-track"><div class="pm-bar-fill ${fav==='draw'?'fav':'mid'}" style="width:${Math.max(dp,2)}%"></div></div>`;
  html += `<span class="pm-bar-pct">${dp}%</span>`;
  html += '</div>';

  // Probability bar: Away
  html += '<div class="pm-bar-row">';
  html += `<span class="pm-bar-label ${fav==='away'?'fav':''}">${t('poll.away')}</span>`;
  html += `<div class="pm-bar-track"><div class="pm-bar-fill ${fav==='away'?'fav':(ap>hp&&ap>dp?'mid':'dog')}" style="width:${Math.max(ap,2)}%"></div></div>`;
  html += `<span class="pm-bar-pct">${ap}%</span>`;
  html += '</div>';

  // Prediction direction
  if (!isDone) {
    const predTeam = fav === 'home' ? teamName(match.home_team) : (fav === 'away' ? teamName(match.away_team) : '');
    const predLabel = fav === 'draw' ? '倾向平局' : (predTeam ? `${predTeam} 更被看好` : '');
    const favClass = favPct > 60 ? 'fav' : (favPct < 45 ? 'dog' : 'even');
    html += `<div class="pm-prediction ${favClass}">📈 市场预测: ${predLabel} (${favPct}%概率)</div>`;
  }

  // For completed matches: comparison
  if (isDone) {
    const actual = match.home_score > match.away_score ? 'home' : (match.home_score < match.away_score ? 'away' : 'draw');
    const actualLabel = actual === 'home' ? t('poll.home') : (actual === 'away' ? t('poll.away') : t('poll.draw'));
    const predLabel = pm.predicted === 'home' ? t('poll.home') : (pm.predicted === 'away' ? t('poll.away') : t('poll.draw'));
    const ok = (pm.predicted === actual);
    const okText = ok ? '✅ 预测正确' : '❌ 预测失败';
    html += `<div class="pm-compare ${ok?'correct':'wrong'}">${okText}: PM预测${predLabel}(${favPct}%) → 实际${actualLabel}(${match.home_score}-${match.away_score})</div>`;
  }

  // Note/context
  if (pm.note) {
    html += `<div class="pm-note">💡 ${pm.note}</div>`;
  }

  // Volume
  if (pm.volume && pm.volume !== 'N/A' && pm.volume !== 'est.') {
    html += `<div class="pm-note">💰 交易量: ${pm.volume}</div>`;
  }

  html += '</div>';
  return html;
}

// ==================== PLAYER DETAIL MODAL ====================
let playerDetails = {};

async function loadPlayerDetails() {
  try {
    const res = await fetch('player_details.json');
    if (res.ok) playerDetails = await res.json();
  } catch(e) {}
}

function openPlayerModal(playerName) {
  const pd = playerDetails[playerName];
  if (!pd) return;

  const content = document.getElementById('playerModalContent');
  const cn = pd.name_cn || '';
  const age = pd.age || '';
  const birth = pd.birth_date || '';
  const birthplace = pd.birth_place || '';
  const nationality = pd.nationality || '';
  const nationalityTeam = pd.nationality_team || '';
  const pos = pd.position || '';
  const posCn = pd.position_cn || '';
  const club = pd.club || '';
  const clubCn = pd.club_cn || '';
  const number = pd.number || '';
  const height = pd.height || '';
  const weight = pd.weight || '';

  // Check if dual nationality
  const isDual = nationality && nationalityTeam && nationality !== nationalityTeam;

  let html = '<div class="modal-header">';
  if (number) html += `<div class="modal-number">#${number}</div>`;
  html += '<div>';
  html += `<div class="modal-name">${pd.name}</div>`;
  if (cn && cn !== pd.name) html += `<div class="modal-name-cn">${cn}</div>`;
  html += '</div></div>';

  // Core info grid
  html += '<div class="modal-grid">';
  if (age) html += `<div class="modal-field"><div class="modal-field-label">年龄</div><div class="modal-field-value">${age}岁</div></div>`;
  if (birth) html += `<div class="modal-field"><div class="modal-field-label">出生日期</div><div class="modal-field-value">${birth}</div></div>`;
  if (birthplace) html += `<div class="modal-field"><div class="modal-field-label">出生地</div><div class="modal-field-value">${birthplace}</div></div>`;
  if (posCn || pos) html += `<div class="modal-field"><div class="modal-field-label">位置</div><div class="modal-field-value">${posCn ? posCn+' '+pos : pos}</div></div>`;
  if (clubCn || club) html += `<div class="modal-field"><div class="modal-field-label">效力俱乐部</div><div class="modal-field-value">${clubCn ? clubCn+' '+club : club}</div></div>`;
  if (height) html += `<div class="modal-field"><div class="modal-field-label">身高</div><div class="modal-field-value">${height}</div></div>`;
  if (weight) html += `<div class="modal-field"><div class="modal-field-label">体重</div><div class="modal-field-value">${weight}</div></div>`;
  html += '</div>';

  // Nationality badges
  if (nationality) {
    html += '<div style="margin-top:8px;">';
    html += `<span class="modal-flag main">🏴 ${nationality}</span>`;
    if (isDual) html += `<span class="modal-flag other">🌍 代表: ${nationalityTeam}</span>`;
    html += '</div>';
  }

  // Stats
  if (pd.club_goals !== undefined) {
    html += '<div class="modal-stats">';
    html += `<div class="modal-stat"><div class="modal-stat-value">${pd.club_goals||0}</div><div class="modal-stat-label">俱乐部进球</div></div>`;
    html += `<div class="modal-stat"><div class="modal-stat-value">${pd.club_apps||0}</div><div class="modal-stat-label">俱乐部出场</div></div>`;
    html += `<div class="modal-stat"><div class="modal-stat-value">${pd.intl_goals||0}</div><div class="modal-stat-label">国家队进球</div></div>`;
    html += `<div class="modal-stat"><div class="modal-stat-value">${pd.intl_apps||0}</div><div class="modal-stat-label">国家队出场</div></div>`;
    html += `<div class="modal-stat"><div class="modal-stat-value">${pd.career_goals||0}</div><div class="modal-stat-label">职业生涯进球</div></div>`;
    html += `<div class="modal-stat"><div class="modal-stat-value">${pd.career_apps||0}</div><div class="modal-stat-label">职业生涯出场</div></div>`;
    html += '</div>';
  }

  content.innerHTML = html;
  document.getElementById('playerModal').classList.add('active');
}

function closePlayerModal() {
  document.getElementById('playerModal').classList.remove('active');
}

function switchTab(name) {
  const idx = TAB_CONFIG.findIndex(t => t.id === name);
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  // Auto-scroll to latest match when switching to matches tab
  if (name === 'matches') {
    setTimeout(() => scrollToRelevantMatch(), 200);
  }
  // Auto-scroll to 2026 section when switching to goals tab
  if (name === 'goals') {
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const el = document.getElementById('wc2026-section');
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  }
}

let refreshTimer = null;
function scheduleNextRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  const nowTs = Date.now();
  const hasLive = matchData.some(m => {
    if (m.is_result || !m.utc_ts) return false;
    const ko = new Date(m.utc_ts).getTime();
    return nowTs >= ko && nowTs <= ko + 2.2 * 3600000;
  });
  const interval = hasLive ? 15000 : 30000;  // 15s during live, 30s otherwise
  refreshTimer = setInterval(loadData, interval);
}
loadData().then(() => { scheduleNextRefresh(); });

// ── Visit counter v2 (global counter.json + localStorage dedup, cumulative only) ──
(function(){
  try {
    // Local per-browser tracking (UV + PV only, always cumulative)
    const raw = localStorage.getItem('wc_site_stats');
    const stats = raw ? JSON.parse(raw) : { uv: 0, pv: 0 };
    const hasVisited = localStorage.getItem('wc_uv_flag');
    if (!hasVisited) {
      stats.uv += 1;
      localStorage.setItem('wc_uv_flag', '1');
    }
    stats.pv += 1;
    localStorage.setItem('wc_site_stats', JSON.stringify(stats));

    // Show badge (fetches global counter.json for main display)
    function showBadge(pv, uv) {
      const badge = document.createElement('span');
      badge.style.cssText = 'font-size:.65em;color:#64748b;margin-left:6px';
      badge.textContent = '| 👁 ' + pv + ' PV · ' + uv + ' UV';
      document.querySelector('.last-update')?.parentNode?.appendChild(badge);
    }

    fetch('counter.json?t=' + Date.now())
      .then(r => r.json())
      .then(global => {
        showBadge(global.pv + stats.pv - 1, global.uv);
      })
      .catch(() => {
        showBadge(stats.pv, stats.uv);
      });

    // Best-effort sync to local server
    if (!hasVisited) {
      fetch('http://localhost:8888/counter/uv', { mode: 'no-cors' }).catch(() => {});
    }
    fetch('http://localhost:8888/counter/pv', { mode: 'no-cors' }).catch(() => {});
  } catch(e) {}
})();
